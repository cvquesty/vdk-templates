name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      
      - name: Validate YAML syntax
        run: |
          ruby -e "require 'yaml'; YAML.load_file('config_defaults.yml', aliases: true)"
          echo "config_defaults.yml is valid YAML"
      
      - name: Check ERB syntax
        run: |
          find . -name "*.erb" -exec ruby -e "require 'erb'; ERB.new(File.read('{}'))" \; -print
          echo "All ERB templates have valid syntax"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '*.yml config_defaults.yml'
          config_file: .yamllint.yml
        continue-on-error: true
